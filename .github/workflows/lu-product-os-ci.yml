# lu-product-os — reusable CI workflow.
# Projects do NOT copy this file. They copy templates/lu-product-os-ci-caller.yml
# (≈12 lines) into their own .github/workflows/, which calls this one.
# Central changes here propagate to every project instantly.

name: lu-product-os-ci

on:
  workflow_call:
    inputs:
      verify-command:
        description: "Command that runs the project's full quality gates"
        type: string
        required: false
        default: ./scripts/lu-product-os-verify
      central-repo:
        description: "owner/name of the lu-product-os repo (for pr-check script)"
        type: string
        required: false
        default: ${{ github.repository_owner }}/lu-product-os

jobs:
  verify:
    name: verify
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so verify scripts can compute a diff base with
          # `git merge-base origin/$BASE_REF HEAD` on any branch topology
          # (feature -> staging -> main included). Shallow clones made that
          # impossible and pushed projects into --deepen loops that never
          # terminate when the branch was cut from a different trunk.
          fetch-depth: 0

      # Dependency caching — cuts install time on every CI round trip.
      - name: Setup Node with npm cache
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Bun
        if: hashFiles('bun.lock', 'bun.lockb') != ''
        uses: oven-sh/setup-bun@v2

      - name: Bun install cache
        if: hashFiles('bun.lock', 'bun.lockb') != ''
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb') }}

      - name: Composer cache
        if: hashFiles('composer.lock') != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Run project quality gates
        env:
          # The PR's target branch (falls back to the pushed branch on push
          # events). Verify scripts that diff changed files MUST use
          # `git merge-base "origin/${BASE_REF:-main}" HEAD` — see the
          # verify template. Never hardcode a base branch, never --deepen.
          BASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
        run: |
          CMD="${{ inputs.verify-command }}"
          if [ "$CMD" = "./scripts/lu-product-os-verify" ] && [ ! -x "$CMD" ]; then
            echo "::error::No executable scripts/lu-product-os-verify found. Run lu-product-os-doctor to scaffold it."
            exit 1
          fi
          $CMD

  pr-check:
    name: pr-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch lu-product-os scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.central-repo }}
          path: .lu-product-os
          # Works as-is when lu-product-os is public. If it is private, this repo
          # needs a token with read access to it — set org/repo secret
          # LU_PRODUCT_OS_TOKEN and uncomment the next line.
          # token: ${{ secrets.LU_PRODUCT_OS_TOKEN }}

      - name: Run pr-check (gates G2/G3 + tier computation)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: bash .lu-product-os/scripts/lu-product-os-pr-check

  # Free-plan DETECTION MODE: GitHub Free can't enforce branch protection on
  # private repos, so merges cannot be blocked. This job runs on every push to
  # the default branch and verifies the pushed commit came from a pull request
  # with no failing checks. It cannot prevent a bad merge — it makes one loud
  # within minutes: a ::error, a red run on main, and a labeled issue. Doctor
  # reports this configuration as "detection mode". Docs-only pushes (e.g. doc
  # regeneration) are exempt.
  main-guard:
    name: main-guard
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # No permissions block on purpose (same reason as retrigger-pr-check below):
    # declaring `issues: write` here would fail plan-time validation for
    # projects still on an older caller that grants only `issues: read`.
    # Updated callers grant it; on old callers the issue-create step no-ops
    # and the ::error + red run still fire.
    steps:
      - name: Verify this push came from a green PR
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          R="$GITHUB_REPOSITORY"
          VIOLATION=""

          # Exempt docs-only pushes (doc regeneration, plan edits, markdown).
          FILES=$(gh api "repos/$R/commits/$SHA" --jq '[.files[].filename] | join("\n")' 2>/dev/null || true)
          if [ -n "$FILES" ] && ! grep -vE '^(0-documentation-codebase/|0-plan/|0-wip/|.*\.md$)' <<<"$FILES" >/dev/null; then
            echo "Docs-only push — exempt."
            exit 0
          fi

          PR_COUNT=$(gh api "repos/$R/commits/$SHA/pulls" --jq 'length' 2>/dev/null || echo 0)
          if [ "${PR_COUNT:-0}" -eq 0 ]; then
            VIOLATION="Commit $SHA landed on ${GITHUB_REF_NAME} with no associated pull request (direct push)."
          else
            PR=$(gh api "repos/$R/commits/$SHA/pulls" --jq '.[0].number')
            BAD=$(gh pr view "$PR" --repo "$R" --json statusCheckRollup \
              --jq '[.statusCheckRollup[]? | select((.conclusion // .state // "") | test("FAILURE|CANCELLED|TIMED_OUT|ERROR"; "i"))] | length' 2>/dev/null || echo 0)
            if [ "${BAD:-0}" -gt 0 ]; then
              VIOLATION="PR #$PR was merged with ${BAD} failing check(s) (commit $SHA)."
            fi
          fi

          if [ -z "$VIOLATION" ]; then
            echo "Push verified: came from a PR with no failing checks."
            exit 0
          fi

          echo "::error::main-guard: $VIOLATION"
          EXISTING=$(gh issue list --repo "$R" --label lu-product-os-guard --state open --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "${EXISTING:-0}" -eq 0 ]; then
            gh label create lu-product-os-guard --repo "$R" --color B60205 \
              --description "main-guard violation (unverified merge)" 2>/dev/null || true
            gh issue create --repo "$R" --label lu-product-os-guard \
              --title "main-guard: unverified merge to ${GITHUB_REF_NAME}" \
              --body "$VIOLATION

          Branch protection is not active on this repo (free-plan detection mode), so this merge was not blocked. Review the commit, revert if it should not have landed, then close this issue." || true
          else
            echo "An open main-guard issue already exists — not filing another."
          fi
          exit 1

  # Comments don't re-trigger pull_request workflows, so without this job a
  # full-tier PR born red on G3 stays red even after the verifier posts
  # "VERDICT: approve" — until someone pushes or re-runs manually. This job
  # fires on verdict comments and re-runs the failed pr-check of the PR's
  # latest CI run, so the check flips on the PR head SHA itself.
  # Requires the caller to trigger on `issue_comment: types: [created]` and
  # grant `actions: write` (see templates/lu-product-os-ci-caller.yml).
  retrigger-pr-check:
    name: retrigger-pr-check
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'VERDICT:')
    runs-on: ubuntu-latest
    # No permissions block on purpose: this job inherits whatever the caller
    # grants (updated callers grant `actions: write`). Declaring it here would
    # fail plan-time validation for projects still on the old caller — even
    # though this job never runs for them (no issue_comment trigger).
    steps:
      - name: Re-run failed pr-check on this PR's latest CI run
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)
          RUN=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?event=pull_request&head_sha=${HEAD_SHA}" \
            | jq --arg wn "$WORKFLOW_NAME" \
                '[.workflow_runs[] | select(.name == $wn)] | sort_by(.created_at) | last // empty')
          if [ -z "$RUN" ]; then
            echo "::notice::No pull_request CI run found for head ${HEAD_SHA} — nothing to re-trigger."
            exit 0
          fi
          RUN_ID=$(jq -r '.id' <<<"$RUN")
          STATUS=$(jq -r '.status' <<<"$RUN")
          CONCLUSION=$(jq -r '.conclusion' <<<"$RUN")
          if [ "$STATUS" != "completed" ]; then
            echo "::notice::Run ${RUN_ID} is still in progress — its pr-check will read the fresh verdict on its own."
            exit 0
          fi
          if [ "$CONCLUSION" = "success" ]; then
            echo "::notice::Run ${RUN_ID} is already green — nothing to re-run."
            exit 0
          fi
          echo "Verdict comment by ${COMMENTER} — re-running failed jobs of run ${RUN_ID}."
          gh api -X POST "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/rerun-failed-jobs"
